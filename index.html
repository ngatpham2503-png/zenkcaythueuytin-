<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>its_zenk cày thuê</title>
    <style>
        /* --- Màn Hình Chào Kích Hoạt Nhạc Nền --- */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .start-web-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            background: #111827;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 20px rgba(127, 0, 255, 0.4);
            transition: all 0.3s ease;
        }

        .start-web-btn::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #ff007f);
            background-size: 400%;
            border-radius: 15px;
            z-index: -1;
            animation: borderGlow 6s linear infinite;
        }

        .start-web-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
        }

        /* --- Giao diện tổng thể --- */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- FIX LAG HOÀN TOÀN: DÙNG SVG ĐƯỢC MÃ HÓA CHO NỀN --- */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            /* Thay thế gradient bằng SVG thuần, giúp điện thoại load mượt tuyệt đối không khựng */
            background-image: url("data:image/svg+xml,%3Csvg width='180' height='180' viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 180L180 0M-45 180L135 -45M45 225L225 45' stroke='rgba(0, 225, 255, 0.12)' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            animation: moveLines 12s linear infinite;
            will-change: background-position;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(0, 225, 255, 0.05), transparent 75%);
            pointer-events: none;
        }

        /* Điểm kết thúc khớp chính xác 100% với kích thước ảnh, loại bỏ hoàn toàn hiện tượng khựng */
        @keyframes moveLines {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 180px 180px;
            }
        }

        /* --- Banner & Avatar --- */
        .header-container {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 800px;
        }

        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            padding: 4px;
            border-radius: 16px;
            background: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #ff007f);
            background-size: 400%;
            animation: borderGlow 6s linear infinite;
            box-shadow: 0 0 25px rgba(127, 0, 255, 0.6);
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            display: block;
            background-color: #111827;
        }

        .badge {
            background-color: #1e293b;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 5px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }

        h1 {
            font-size: 42px;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: #ffffff;
        }

        .sub-features {
            color: #9ca3af;
            font-size: 14px;
            margin: 8px 0 15px 0;
        }

        .username-tag {
            background-color: #111827;
            border: 1px solid #334155;
            padding: 6px 18px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        .username-tag span {
            color: #10b981;
            margin-right: 5px;
        }

        /* --- Khu Vực Khuyến Mãi --- */
        .discord-promo {
            background: linear-gradient(135deg, #4c1d95, #1e1b4b);
            border: 2px dashed #8b5cf6;
            border-radius: 12px;
            padding: 15px;
            margin: 10px auto 30px;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            width: 90%;
        }

        .discord-promo p {
            margin: 0 0 10px 0;
            font-size: 15px;
            font-weight: 500;
        }

        .discord-btn {
            display: inline-block;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
            transition: all 0.3s ease;
        }

        .discord-btn:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
        }

        /* --- Khu vực Hỗ trợ --- */
        .support-container {
            width: 90%;
            max-width: 800px;
            margin: 10px auto 50px auto;
            text-align: center;
        }

        .support-box {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .support-box p {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #cbd5e1;
        }

        .support-btn {
            display: inline-block;
            background: linear-gradient(90deg, #10b981, #059669);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }

        .support-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
            filter: brightness(1.1);
        }

        /* --- Danh sách dịch vụ --- */
        .services-list {
            width: 90%;
            max-width: 800px;
            padding-bottom: 40px;
        }

        .accordion-item {
            background-color: #111827;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border-left: 5px solid #3b82f6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .accordion-item.level { border-left-color: #3b82f6; }
        .accordion-item.leviathan { border-left-color: #eab308; }
        .accordion-item.ring { border-left-color: #a855f7; }
        .accordion-item.spirit { border-left-color: #06b6d4; }
        .accordion-item.dragon { border-left-color: #ec4899; }
        .accordion-item.sword { border-left-color: #f97316; }
        .accordion-item.race { border-left-color: #10b981; }

        .accordion-item.level:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .accordion-item.leviathan:hover { box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); }
        .accordion-item.ring:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        .accordion-item.spirit:hover { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
        .accordion-item.dragon:hover { box-shadow: 0 0 20px rgba(236, 72, 153, 0.3); }
        .accordion-item.sword:hover { box-shadow: 0 0 20px rgba(249, 115, 22, 0.3); }
        .accordion-item.race:hover { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }

        .accordion-header {
            width: 100%;
            background: none;
            border: none;
            padding: 20px;
            color: white;
            text-align: left;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .accordion-header:hover { background-color: #1f2937; }
        .header-title { display: flex; align-items: center; gap: 15px; }
        
        /* Hiệu ứng Icon bập bênh siêu mượt */
        .icon-glow {
            display: inline-block;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0, 225, 255, 0.8);
            animation: iconFloat 3s ease-in-out infinite alternate;
            will-change: transform;
        }

        @keyframes iconFloat {
            0% { transform: rotate(-4deg) translateY(0); }
            100% { transform: rotate(4deg) translateY(-1px); }
        }

        .icon-arrow { 
            font-size: 12px; 
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1); 
            color: #6b7280; 
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #0f172a;
        }

        .price-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .price-card {
            background-color: #1e293b;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .price-card:hover {
            transform: translateY(-4px);
            border-color: #4b5563;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .price-card .tier { font-size: 14px; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
        .price-card .cost { font-size: 20px; font-weight: bold; color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .price-card .note { font-size: 11px; color: #64748b; margin-top: 5px; }

        .accordion-item.active .icon-arrow { transform: rotate(180deg); color: #fff; }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <button class="start-web-btn" onclick="startWebsite()">Vào Xem Bảng Giá ✨</button>
    </div>

    <audio id="bg-music" src="AQMbjy3W4ql7zhH5U-E_30DEBj5CtmsqUzRqf6nYUn-HzqF0_Ki_wt31WZb02N8WhLF6Ke2Gm07RVWaecqlwSfTOuOgBqwg-2jjO.mp3" loop></audio>

    <div class="header-container">
        <div class="avatar-wrapper">
            <img class="avatar" src="00401f37-5f47-448a-8cc1-74a0a16fc700.jpg" alt="Avatar">
        </div>
        <div class="badge">✦ DỊCH VỤ CÀY THUÊ ✦</div>
        <h1 id="web-title">BẢNG GIÁ CÀY THUÊ</h1>
        <div class="sub-features">Giá rẻ • Uy tín • Nhanh chóng</div>
        <div class="username-tag"><span>●</span> its_zenk</div>
    </div>

    <div class="discord-promo">
        <p>🎁 <strong>ƯU ĐÃI ĐẶC BIỆT:</strong> Ai vô Discord sẽ được <strong>giảm ngay 5%</strong> tổng hóa đơn!</p>
        <a id="discord-link" href="https://discord.com/invite/eZ7JZf3Nuu" target="_blank" class="discord-btn">Tham Gia Discord Ngay</a>
    </div>

    <div class="services-list" id="main-services-container">
    </div>

    <div class="support-container">
        <div class="support-box">
            <p>💬 Bạn cần tư vấn thêm hoặc yêu cầu dịch vụ riêng?</p>
            <a href="https://discord.gg/DyqS5U3E" target="_blank" class="support-btn">Ib Để Được Hỗ Trợ Thêm</a>
        </div>
    </div>

    <script>
        function startWebsite() {
            const music = document.getElementById('bg-music');
            const overlay = document.getElementById('welcome-overlay');
            music.play().catch(error => console.log("Lỗi phát nhạc:", error));
            overlay.style.opacity = '0';
            overlay.style.transform = 'scale(1.1)';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 500);
        }

        const defaultData = {
            level: [
                { tier: "Level 1 – 700", cost: "10.000đ", note: "" },
                { tier: "Level 700 – 1500", cost: "10.000đ", note: "" },
                { tier: "Level 1500 – 2800", cost: "20.000đ", note: "" }
            ],
            leviathan: [
                { tier: "10 Mythical", cost: "25.000đ", note: "" },
                { tier: "20 Legendary", cost: "25.000đ", note: "" }
            ],
            ring: [
                { tier: "1 Legendary Ring (Random)", cost: "10.000đ", note: "" },
                { tier: "Các loại Nhẫn III (Random)", cost: "15.000đ", note: "" },
                { tier: "1 Mythical Ring (Random)", cost: "60.000đ", note: "" },
                { tier: "10 Legendary Ring (Random)", cost: "80.000đ", note: "" }
            ],
            spirit: [
                { tier: "Ring of Twin Blade IV", cost: "75.000đ", note: "" },
                { tier: "Ring of Outlaw IV", cost: "75.000đ", note: "" },
                { tier: "Ring of Steelheart IV", cost: "70.000đ", note: "" },
                { tier: "Ring of Arcanist IV", cost: "70.000đ", note: "" },
                { tier: "Ring of Spirit", cost: "80.000đ", note: "" },
                { tier: "Ring of Might", cost: "85.000đ", note: "" }
            ],
            dragon: [
                { tier: "Full Đai", cost: "40.000đ", note: "Có sẵn 1 đai trừ đi 8k" },
                { tier: "Dragonheart + 500 Mastery", cost: "20.000đ", note: "" },
                { tier: "Dragonstorm + 500 Mastery", cost: "20.000đ", note: "" }
            ],
            sword: [
                { tier: "Yoru V1 - V3", cost: "90.000đ", note: "" },
                { tier: "Fox Lamp", cost: "30.000đ", note: "" },
                { tier: "CDK", cost: "10.000đ", note: "Yêu cầu có sẵn Tushita & Yama" },
                { tier: "TTK", cost: "10.000đ", note: "Yêu cầu có sẵn 3 kiếm Legendary" },
                { tier: "Tushita", cost: "10.000đ", note: "" },
                { tier: "Yama", cost: "10.000đ", note: "" },
                { tier: "Shisui", cost: "10.000đ", note: "" },
                { tier: "Wando", cost: "10.000đ", note: "" },
                { tier: "Saishi", cost: "10.000đ", note: "" }
            ],
            race: [
                { tier: "Up Tộc V1 - V3", cost: "10.000đ", note: "" },
                { tier: "Gạt Cần", cost: "20.000đ", note: "" },
                { tier: "Tộc V4 (1 Gear)", cost: "10.000đ", note: "" },
                { tier: "Tộc V4 (Full Gear)", cost: "30.000đ", note: "" }
            ]
        };

        const categoryNames = {
            level: { title: "Level / Farm Level", icon: "⚡" },
            leviathan: { title: "Leviathan", icon: "🐉" },
            ring: { title: "Dungeon Ring", icon: "💍" },
            spirit: { title: "Dungeon Ring IV / Spirit", icon: "👑" },
            dragon: { title: "Draco / Dragon", icon: "🔥" },
            sword: { title: "Sword / Vũ Khí", icon: "⚔️" },
            race: { title: "Race", icon: "🏁" }
        };

        let currentData = defaultData;

        function renderWeb() {
            const container = document.getElementById('main-services-container');
            container.innerHTML = '';
            const order = ['level', 'leviathan', 'ring', 'spirit', 'dragon', 'sword', 'race'];

            order.forEach(cat => {
                if(!currentData[cat]) currentData[cat] = [];
                let cardsHtml = '';
                currentData[cat].forEach(item => {
                    cardsHtml += `
                        <div class="price-card">
                            <div class="tier">${item.tier}</div>
                            <div class="cost">${item.cost}</div>
                            ${item.note ? `<div class="note">${item.note}</div>` : ''}
                        </div>
                    `;
                });

                const itemHtml = `
                    <div class="accordion-item ${cat}" id="item-${cat}">
                        <button class="accordion-header" onclick="handleAccordion('item-${cat}')">
                            <div class="header-title">
                                <span class="icon-glow">${categoryNames[cat].icon}</span> ${categoryNames[cat].title}
                            </div>
                            <span class="icon-arrow">▼</span>
                        </button>
                        <div class="accordion-content">
                            <div class="price-grid">
                                ${cardsHtml || '<div style="color:#64748b; width:100%; text-align:center;">Chưa có gói giá nào.</div>'}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            });
        }

        function handleAccordion(itemId) {
            const clickedItem = document.getElementById(itemId);
            const content = clickedItem.querySelector('.accordion-content');
            const isOpen = clickedItem.classList.contains('active');

            document.querySelectorAll('.accordion-item').forEach(item => {
                item.classList.remove('active');
                item.querySelector('.accordion-content').style.maxHeight = null;
            });

            if (!isOpen) {
                clickedItem.classList.add('active');
                content.style.maxHeight = content.scrollHeight + "px";
            }
        }

        renderWeb();
    </script>
</body>
</html>
